name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & test
        run: mvn -B clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/app.jar
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: app-jar
          path: .

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: app.jar
          target: /home/${{ secrets.EC2_USER }}/deploy

      - name: Restart service & health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/spring-app
            sudo mv "/home/${{ secrets.EC2_USER }}/deploy/app.jar" /opt/spring-app/app.jar
            sudo systemctl restart spring-app

            for i in $(seq 1 15); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || true)
              if [ "$code" = "200" ]; then
                echo "Health check passed (HTTP 200 from /actuator/health)"
                exit 0
              fi
              echo "Attempt $i: got '$code', retrying..."
              sleep 3
            done
            echo "Health check failed after restart"
            sudo systemctl status spring-app --no-pager || true
            exit 1
